name: docx-v2 CI

on:
  pull_request:
    paths:
      - 'apps/docgen-v2/**'
      - 'packages/**'
      - 'migrations/0101_*'
      - 'migrations/0102_*'
      - 'migrations/0103_*'
      - 'migrations/0104_*'
      - 'migrations/0105_*'
      - 'migrations/0106_*'
      - 'migrations/0107_*'
      - 'migrations/0108_*'
      - 'migrations/0109_*'
      - 'migrations/0110_*'
      - 'migrations/0111_*'
      - 'frontend/apps/web/src/features/documents/v2/**'
      - 'internal/platform/config/feature_flags*.go'
      - 'internal/platform/featureflags/**'
      - 'internal/platform/servicebus/docgen_v2_client*.go'
      - 'internal/modules/templates/**'
      - 'internal/modules/editor_sessions/**'
      - 'internal/modules/document_revisions/**'
      - 'frontend/apps/web/src/features/featureFlags.ts'
      - 'frontend/apps/web/src/features/__tests__/featureFlags.docxV2.test.ts'
      - 'tests/docx_v2/**'
      - 'scripts/docx-v2-*'
      - '.github/workflows/docx-v2-ci.yml'

jobs:
  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20.11.0, cache: npm }
      - run: npm ci --include-workspace-root
      - run: npm run typecheck:docx-v2
      - run: npm run test:docx-v2
      - run: npm run build:docx-v2
  frontend-docxv2-flag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20.11.0, cache: npm, cache-dependency-path: frontend/apps/web/package-lock.json }
      - run: npm ci
        working-directory: frontend/apps/web
      - run: npm run test -- featureFlags.docxV2.test.ts
        working-directory: frontend/apps/web
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: 1.25.x, cache: true }
      - run: go build ./...
      - run: go test ./internal/platform/config/... ./internal/platform/featureflags/... ./internal/platform/servicebus/... ./internal/platform/ratelimit/... ./internal/platform/objectstore/... ./internal/modules/templates/... ./internal/modules/editor_sessions/... ./internal/modules/document_revisions/... ./internal/modules/documents_v2/... ./tests/docx_v2/...
  migration-smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: metaldocs
          POSTGRES_PASSWORD: metaldocs
          POSTGRES_DB: metaldocs
        options: >-
          --health-cmd "pg_isready -U metaldocs"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
        ports: [ "5432:5432" ]
    steps:
      - uses: actions/checkout@v4
      - name: Apply docx-v2 migrations
        env:
          PGPASSWORD: metaldocs
        run: |
          for f in migrations/0101_*.sql migrations/0102_*.sql migrations/0103_*.sql \
                   migrations/0104_*.sql migrations/0105_*.sql migrations/0106_*.sql \
                   migrations/0107_*.sql migrations/0108_*.sql migrations/0111_*.sql; do
            echo "==> $f"
            psql -h 127.0.0.1 -U metaldocs -d metaldocs -v ON_ERROR_STOP=1 -f "$f"
          done
      - name: Verify tables + indexes
        env:
          PGPASSWORD: metaldocs
          SERVICE: 127.0.0.1
        run: |
          for t in templates template_versions documents_v2 editor_sessions document_revisions autosave_pending_uploads document_checkpoints template_audit_log document_exports; do
            psql -h 127.0.0.1 -U metaldocs -d metaldocs -tAc "SELECT to_regclass('public.$t')" | grep -qx "$t"
          done
          for idx in idx_one_draft_per_template idx_one_active_session_per_doc idx_pending_expired idx_documents_v2_form_data_gin; do
            psql -h 127.0.0.1 -U metaldocs -d metaldocs -tAc "SELECT 1 FROM pg_indexes WHERE indexname='$idx'" | grep -qx 1
          done
  e2e-templates:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env: { POSTGRES_USER: metaldocs, POSTGRES_PASSWORD: metaldocs, POSTGRES_DB: metaldocs }
        options: >-
          --health-cmd "pg_isready -U metaldocs"
          --health-interval 5s --health-timeout 3s --health-retries 10
        ports: [ "5432:5432" ]
      minio:
        image: minio/minio:RELEASE.2024-04-18T19-09-19Z
        env: { MINIO_ROOT_USER: minioadmin, MINIO_ROOT_PASSWORD: minioadmin }
        ports: [ "9000:9000" ]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: 1.25.x }
      - uses: actions/setup-node@v4
        with: { node-version: 20.11.0, cache: npm }
      - run: |
          for f in migrations/0101_*.sql migrations/0102_*.sql migrations/0103_*.sql migrations/0104_*.sql migrations/0105_*.sql migrations/0106_*.sql migrations/0107_*.sql migrations/0108_*.sql; do
            PGPASSWORD=metaldocs psql -h 127.0.0.1 -U metaldocs -d metaldocs -v ON_ERROR_STOP=1 -f "$f"
          done
      - run: npm ci --include-workspace-root
      - run: npm ci
        working-directory: frontend/apps/web
      - run: METALDOCS_DOCX_V2_ENABLED=true go run ./apps/api/cmd/metaldocs-api &
        env: { PGCONN: "postgres://metaldocs:metaldocs@127.0.0.1:5432/metaldocs?sslmode=disable" }
      - run: DOCGEN_V2_SERVICE_TOKEN=test-token-0123456789 DOCGEN_V2_S3_ACCESS_KEY=minioadmin DOCGEN_V2_S3_SECRET_KEY=minioadmin npm run start --workspace @metaldocs/docgen-v2 &
      - run: npx playwright install --with-deps chromium
        working-directory: frontend/apps/web
      - run: npx playwright test author-happy-path.spec.ts
        working-directory: frontend/apps/web
  e2e-documents:
    runs-on: ubuntu-latest
    needs: [e2e-templates]
    services:
      postgres:
        image: postgres:16-alpine
        env: { POSTGRES_USER: metaldocs, POSTGRES_PASSWORD: metaldocs, POSTGRES_DB: metaldocs }
        options: >-
          --health-cmd "pg_isready -U metaldocs"
          --health-interval 5s --health-timeout 3s --health-retries 10
        ports: [ "5432:5432" ]
      minio:
        image: minio/minio:RELEASE.2024-04-18T19-09-19Z
        env: { MINIO_ROOT_USER: minioadmin, MINIO_ROOT_PASSWORD: minioadmin }
        ports: [ "9000:9000" ]
      gotenberg:
        image: gotenberg/gotenberg:8.4
        ports: [ "3000:3000" ]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: 1.25.x }
      - uses: actions/setup-node@v4
        with: { node-version: 20.11.0, cache: npm }
      - name: Apply migrations (0101-0110)
        run: |
          for f in migrations/0101_*.sql migrations/0102_*.sql migrations/0103_*.sql migrations/0104_*.sql migrations/0105_*.sql migrations/0106_*.sql migrations/0107_*.sql migrations/0108_*.sql migrations/0109_*.sql migrations/0110_*.sql; do
            PGPASSWORD=metaldocs psql -h 127.0.0.1 -U metaldocs -d metaldocs -v ON_ERROR_STOP=1 -f "$f"
          done
      - run: npm ci --include-workspace-root
      - run: npm ci
        working-directory: frontend/apps/web
      - run: METALDOCS_DOCX_V2_ENABLED=true go run ./apps/api/cmd/metaldocs-api &
        env: { PGCONN: "postgres://metaldocs:metaldocs@127.0.0.1:5432/metaldocs?sslmode=disable" }
      - run: DOCGEN_V2_SERVICE_TOKEN=test-token-0123456789 DOCGEN_V2_S3_ACCESS_KEY=minioadmin DOCGEN_V2_S3_SECRET_KEY=minioadmin npm run start --workspace @metaldocs/docgen-v2 &
      - run: npx playwright install --with-deps chromium
        working-directory: frontend/apps/web
      - run: npx playwright test filler-happy-path.spec.ts conflict-two-tabs.spec.ts autosave-crash.spec.ts
        working-directory: frontend/apps/web
  e2e-exports:
    runs-on: ubuntu-latest
    needs: [e2e-documents]
    services:
      postgres:
        image: postgres:16-alpine
        env: { POSTGRES_USER: metaldocs, POSTGRES_PASSWORD: metaldocs, POSTGRES_DB: metaldocs }
        options: >-
          --health-cmd "pg_isready -U metaldocs"
          --health-interval 5s --health-timeout 3s --health-retries 10
        ports: [ "5432:5432" ]
      minio:
        image: minio/minio:RELEASE.2024-04-18T19-09-19Z
        env: { MINIO_ROOT_USER: minioadmin, MINIO_ROOT_PASSWORD: minioadmin }
        ports: [ "9000:9000" ]
      gotenberg:
        image: gotenberg/gotenberg:8.4
        ports: [ "3000:3000" ]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: 1.25.x }
      - uses: actions/setup-node@v4
        with: { node-version: 20.11.0, cache: npm }
      - name: Apply migrations (0101-0111)
        run: |
          for f in migrations/0101_*.sql migrations/0102_*.sql migrations/0103_*.sql \
                   migrations/0104_*.sql migrations/0105_*.sql migrations/0106_*.sql \
                   migrations/0107_*.sql migrations/0108_*.sql migrations/0109_*.sql \
                   migrations/0110_*.sql migrations/0111_*.sql; do
            PGPASSWORD=metaldocs psql -h 127.0.0.1 -U metaldocs -d metaldocs -v ON_ERROR_STOP=1 -f "$f"
          done
      - run: npm ci --include-workspace-root
      - run: npm ci
        working-directory: frontend/apps/web
      - run: METALDOCS_DOCX_V2_ENABLED=true go run ./apps/api/cmd/metaldocs-api &
        env:
          PGCONN: "postgres://metaldocs:metaldocs@127.0.0.1:5432/metaldocs?sslmode=disable"
          DOCGEN_V2_URL: "http://127.0.0.1:4000"
          DOCGEN_V2_SERVICE_TOKEN: "test-token-0123456789"
      - run: |
          DOCGEN_V2_SERVICE_TOKEN=test-token-0123456789 \
          DOCGEN_V2_S3_ACCESS_KEY=minioadmin \
          DOCGEN_V2_S3_SECRET_KEY=minioadmin \
          DOCGEN_V2_GOTENBERG_URL=http://127.0.0.1:3000 \
          npm run start --workspace @metaldocs/docgen-v2 &
      - run: npx playwright install --with-deps chromium
        working-directory: frontend/apps/web
      - run: npx playwright test export-pdf-happy-path.spec.ts export-pdf-cache-hit.spec.ts export-rate-limit.spec.ts
        working-directory: frontend/apps/web
