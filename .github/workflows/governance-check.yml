name: governance-check

on:
  pull_request:
    branches: [ main ]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base ref
        run: git fetch origin ${{ github.base_ref }} --depth=1

      - name: Run governance checks (PowerShell)
        shell: pwsh
        run: ./scripts/check-governance.ps1 -BaseRef "origin/${{ github.base_ref }}"
