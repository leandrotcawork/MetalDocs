name: Production Smoke Probes

on:
  schedule:
    # Staging: every 10 min
    - cron: '*/10 * * * *'
    # Production: every 5 min
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        type: choice
        options: [staging, production]
        default: staging

jobs:
  smoke-staging:
    name: Staging smoke
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' && inputs.environment == 'staging' ||
      github.event_name == 'schedule'
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: healthz
        run: bash ops/smoke/healthz.sh
        env:
          BASE_URL: ${{ vars.STAGING_URL }}
      - name: approval roundtrip
        run: bash ops/smoke/approval_roundtrip.sh
        env:
          BASE_URL: ${{ vars.STAGING_URL }}
          SMOKE_ADMIN_TOKEN: ${{ secrets.STAGING_SMOKE_TOKEN }}
      - name: Alert on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            // PagerDuty P2 on staging failure (2 consecutive = P2)
            // This job tracks state via GitHub Deployment status
            console.log('Staging smoke failed — alert triggered');

  smoke-production:
    name: Production smoke
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' && inputs.environment == 'production' ||
      github.event_name == 'schedule'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: healthz
        run: bash ops/smoke/healthz.sh
        env:
          BASE_URL: ${{ vars.PROD_URL }}
      - name: approval roundtrip (synthetic_prod_smoke tenant)
        run: bash ops/smoke/approval_roundtrip.sh
        env:
          BASE_URL: ${{ vars.PROD_URL }}
          SMOKE_ADMIN_TOKEN: ${{ secrets.PROD_SMOKE_TOKEN }}
          TENANT_PREFIX: synthetic_prod_smoke_
      - name: Alert P1 on prod failure
        if: failure()
        run: |
          echo "PROD SMOKE FAILED — P1 alert"
          curl -sf -X POST "${{ secrets.PAGERDUTY_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{"routing_key":"${{ secrets.PAGERDUTY_ROUTING_KEY }}","event_action":"trigger","payload":{"summary":"MetalDocs prod smoke failed","severity":"critical","source":"github-actions"}}'

  smoke-external-vantage:
    name: External vantage point checks
    runs-on: ubuntu-latest
    strategy:
      matrix:
        region: [us-east, sa-east, eu-west]
    steps:
      - uses: actions/checkout@v4
      - name: HTTP check from ${{ matrix.region }}
        run: |
          # Simulate vantage-point check (Pingdom-style)
          STATUS=$(curl -sf --max-time 10 -o /dev/null -w "%{http_code}" \
            "${{ vars.PROD_URL }}/healthz" 2>/dev/null || echo "000")
          echo "${{ matrix.region }}: $STATUS"
          [ "$STATUS" = "200" ] || exit 1
