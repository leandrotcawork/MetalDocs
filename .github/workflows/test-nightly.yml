name: Test Nightly Stress
on:
  schedule:
    - cron: '0 2 * * *'  # 02:00 UTC daily
  workflow_dispatch:

jobs:
  nightly:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: metaldocs
          POSTGRES_PASSWORD: metaldocs
          POSTGRES_DB: metaldocs
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run nightly stress tests
        env:
          METALDOCS_DATABASE_URL: postgres://metaldocs:metaldocs@localhost:5432/metaldocs?sslmode=disable
          INTEGRATION_STRESS_N: "500"
        run: |
          go test -tags integration -count=1 -race -timeout 3600s ./tests/integration/...
        timeout-minutes: 60
      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Nightly stress test failure - ${new Date().toISOString().split('T')[0]}`,
              labels: ['nightly-failure', 'integration'],
              body: `Nightly stress run failed. See run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            })
