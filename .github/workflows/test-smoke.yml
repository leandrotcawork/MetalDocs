name: Test Smoke (PR)
on:
  pull_request:
    branches: [main, develop]

jobs:
  smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: metaldocs
          POSTGRES_PASSWORD: metaldocs
          POSTGRES_DB: metaldocs
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run integration smoke tests
        env:
          METALDOCS_DATABASE_URL: postgres://metaldocs:metaldocs@localhost:5432/metaldocs?sslmode=disable
        run: |
          go test -tags integration -run "TestTriggerBypass|TestMembership|TestSchemaLockdown|TestLegacy|TestE2E" -timeout 120s ./tests/integration/scenarios/
        timeout-minutes: 2
