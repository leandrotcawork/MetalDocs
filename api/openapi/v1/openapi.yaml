        '403':
          description: Sem permissao
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
  /process-areas/{code}:
    put:
      summary: Atualiza uma area de processo documental
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProcessAreaUpdateRequest'
      responses:
        '200':
          description: Area atualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistryMutationResponse'
        '400':
          description: Requisicao invalida
