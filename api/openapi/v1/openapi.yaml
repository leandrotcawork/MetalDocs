        name:
          type: string
        description:
          type: string
    ListDocumentFamiliesResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/DocumentFamilyItem'
    DocumentProfileItem:
