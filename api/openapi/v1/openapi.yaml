openapi: 3.0.3
info:
  title: MetalDocs API
  version: 1.0.0
  description: >
    API inicial do MetalDocs (v1). Escopo atual sem integracao com IA.
servers:
  - url: http://192.168.0.3:8080/api/v1
paths:
  /health/live:
    get:
      summary: Liveness check
      responses:
        '200':
          description: API em execucao
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
  /health/ready:
    get:
      summary: Readiness check
      responses:
        '200':
          description: Dependencias prontas
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
  /metrics:
    get:
      summary: HTTP RED metrics por rota
      responses:
        '200':
          description: Metricas de requests, erros e duracao
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetricsResponse'
  /document-types:
    get:
      summary: Lista os tipos documentais suportados
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
      responses:
        '200':
          description: Lista de tipos documentais
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListDocumentTypesResponse'
        '401':
          description: Nao autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '403':
          description: Sem permissao
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
  /access-policies:
    get:
      summary: Lista policies de acesso por recurso
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: resourceScope
          in: query
          required: true
          schema:
            type: string
            enum: [document, document_type, area]
        - name: resourceId
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Lista de policies
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListAccessPoliciesResponse'
        '400':
          description: Requisicao invalida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '401':
          description: Nao autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '403':
          description: Sem permissao
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
    put:
      summary: Substitui policies de acesso de um recurso
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReplaceAccessPoliciesRequest'
      responses:
        '200':
          description: Policies substituidas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReplaceAccessPoliciesResponse'
        '400':
          description: Requisicao invalida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '401':
          description: Nao autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '403':
          description: Sem permissao
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
  /documents:
    post:
      summary: Cria documento e primeira versao
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDocumentRequest'
      responses:
        '201':
          description: Documento criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentCreatedResponse'
        '400':
          description: Requisicao invalida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '401':
          description: Nao autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '403':
          description: Sem permissao
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
    get:
      summary: Lista documentos
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
      responses:
        '200':
          description: Lista de documentos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListDocumentsResponse'
        '401':
          description: Nao autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '403':
          description: Sem permissao
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
  /documents/{documentId}:
    get:
      summary: Busca um documento por id
      parameters:
        - $ref: '#/components/parameters/DocumentId'
        - $ref: '#/components/parameters/UserIdHeader'
      responses:
        '200':
          description: Documento encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentListItem'
        '401':
          description: Nao autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '403':
          description: Sem permissao
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '404':
          description: Documento nao encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
  /documents/{documentId}/versions:
    post:
      summary: Cria nova versao do documento
      parameters:
        - $ref: '#/components/parameters/DocumentId'
        - $ref: '#/components/parameters/UserIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddVersionRequest'
      responses:
        '201':
          description: Nova versao criada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionListItem'
        '400':
          description: Requisicao invalida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '401':
          description: Nao autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '403':
          description: Sem permissao
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '404':
          description: Documento nao encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '409':
          description: Versionamento nao permitido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
    get:
      summary: Lista versoes de um documento
      parameters:
        - $ref: '#/components/parameters/DocumentId'
        - $ref: '#/components/parameters/UserIdHeader'
      responses:
        '200':
          description: Lista de versoes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListVersionsResponse'
        '401':
          description: Nao autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '403':
          description: Sem permissao
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '404':
          description: Documento nao encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
  /documents/{documentId}/versions/diff:
    get:
      summary: Compara duas versoes do documento
      parameters:
        - $ref: '#/components/parameters/DocumentId'
        - $ref: '#/components/parameters/UserIdHeader'
        - name: fromVersion
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
        - name: toVersion
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Diff entre versoes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionDiffResponse'
        '400':
          description: Requisicao invalida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '401':
          description: Nao autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '403':
          description: Sem permissao
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '404':
          description: Documento ou versao nao encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
  /search/documents:
    get:
      summary: Pesquisa documentos por filtros
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: q
          in: query
          required: false
          schema:
            type: string
        - name: ownerId
          in: query
          required: false
          schema:
            type: string
        - name: documentType
          in: query
          required: false
          schema:
            type: string
            enum: [policy, procedure, work_instruction, contract, supplier_document, technical_drawing, certificate, report, form, manual]
        - name: businessUnit
          in: query
          required: false
          schema:
            type: string
        - name: department
          in: query
          required: false
          schema:
            type: string
        - name: classification
          in: query
          required: false
          schema:
            type: string
            enum: [PUBLIC, INTERNAL, CONFIDENTIAL, RESTRICTED]
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [DRAFT, IN_REVIEW, APPROVED, PUBLISHED, ARCHIVED]
        - name: tag
          in: query
          required: false
          schema:
            type: string
        - name: expiryBefore
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: expiryAfter
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Lista filtrada de documentos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchDocumentsResponse'
        '400':
          description: Requisicao invalida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '401':
          description: Nao autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '403':
          description: Sem permissao
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
  /workflow/documents/{documentId}/transitions:
    post:
      summary: Transiciona o status de workflow do documento
      parameters:
        - $ref: '#/components/parameters/DocumentId'
        - $ref: '#/components/parameters/UserIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkflowTransitionRequest'
      responses:
        '200':
          description: Workflow atualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowTransitionResponse'
        '400':
          description: Requisicao invalida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '401':
          description: Nao autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '403':
          description: Sem permissao
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '404':
          description: Documento nao encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '409':
          description: Transicao invalida para o status atual
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
  /iam/users/{userId}/roles:
    post:
      summary: Cria/atualiza usuario IAM e atribui role
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertUserRoleRequest'
      responses:
        '200':
          description: Role atribuida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpsertUserRoleResponse'
        '400':
          description: Requisicao invalida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '401':
          description: Nao autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '403':
          description: Sem permissao
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
components:
  parameters:
    DocumentId:
      name: documentId
      in: path
      required: true
      schema:
        type: string
    UserIdHeader:
      name: X-User-Id
      in: header
      required: true
      schema:
        type: string
  schemas:
    CreateDocumentRequest:
      type: object
      required:
        - title
        - documentType
        - ownerId
        - businessUnit
        - department
      properties:
        title:
          type: string
          minLength: 1
        documentType:
          type: string
          enum: [policy, procedure, work_instruction, contract, supplier_document, technical_drawing, certificate, report, form, manual]
        ownerId:
          type: string
          minLength: 1
        businessUnit:
          type: string
          minLength: 1
        department:
          type: string
          minLength: 1
        classification:
          type: string
          enum: [PUBLIC, INTERNAL, CONFIDENTIAL, RESTRICTED]
          default: INTERNAL
        tags:
          type: array
          items:
            type: string
        effectiveAt:
          type: string
          format: date-time
        expiryAt:
          type: string
          format: date-time
        metadata:
          type: object
          additionalProperties: true
        initialContent:
          type: string
    DocumentCreatedResponse:
      type: object
      required:
        - documentId
        - version
        - status
        - documentType
      properties:
        documentId:
          type: string
        version:
          type: integer
          minimum: 1
        status:
          type: string
          enum: [DRAFT, IN_REVIEW, APPROVED, PUBLISHED, ARCHIVED]
        documentType:
          type: string
    DocumentListItem:
      type: object
      required: [documentId, title, documentType, ownerId, businessUnit, department, classification, status, tags]
      properties:
        documentId:
          type: string
        title:
          type: string
        documentType:
          type: string
        ownerId:
          type: string
        businessUnit:
          type: string
        department:
          type: string
        classification:
          type: string
        status:
          type: string
        tags:
          type: array
          items:
            type: string
        effectiveAt:
          type: string
          format: date-time
        expiryAt:
          type: string
          format: date-time
    ListDocumentsResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/DocumentListItem'
    DocumentTypeItem:
      type: object
      required: [code, name, description, reviewIntervalDays]
      properties:
        code:
          type: string
        name:
          type: string
        description:
          type: string
        reviewIntervalDays:
          type: integer
          minimum: 1
    ListDocumentTypesResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/DocumentTypeItem'
    AccessPolicyItem:
      type: object
      required: [subjectType, subjectId, resourceScope, resourceId, capability, effect]
      properties:
        subjectType:
          type: string
          enum: [user, role, group]
        subjectId:
          type: string
        resourceScope:
          type: string
          enum: [document, document_type, area]
        resourceId:
          type: string
        capability:
          type: string
          enum: [document.create, document.view, document.edit, document.upload_attachment, document.change_workflow, document.manage_permissions]
        effect:
          type: string
          enum: [allow, deny]
    AccessPolicyWriteItem:
      type: object
      required: [subjectType, subjectId, capability, effect]
      properties:
        subjectType:
          type: string
          enum: [user, role, group]
        subjectId:
          type: string
        capability:
          type: string
          enum: [document.create, document.view, document.edit, document.upload_attachment, document.change_workflow, document.manage_permissions]
        effect:
          type: string
          enum: [allow, deny]
    ListAccessPoliciesResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AccessPolicyItem'
    ReplaceAccessPoliciesRequest:
      type: object
      required: [resourceScope, resourceId, policies]
      properties:
        resourceScope:
          type: string
          enum: [document, document_type, area]
        resourceId:
          type: string
        policies:
          type: array
          items:
            $ref: '#/components/schemas/AccessPolicyWriteItem'
    ReplaceAccessPoliciesResponse:
      type: object
      required: [resourceScope, resourceId, replacedCount]
      properties:
        resourceScope:
          type: string
        resourceId:
          type: string
        replacedCount:
          type: integer
          minimum: 0
    VersionListItem:
      type: object
      required: [documentId, version, contentHash, changeSummary, createdAt]
      properties:
        documentId:
          type: string
        version:
          type: integer
          minimum: 1
        contentHash:
          type: string
        changeSummary:
          type: string
        createdAt:
          type: string
          format: date-time
    AddVersionRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string
        changeSummary:
          type: string
    ListVersionsResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/VersionListItem'
    VersionDiffResponse:
      type: object
      required: [documentId, fromVersion, toVersion, contentChanged, metadataChanged, classificationChanged, effectiveAtChanged, expiryAtChanged]
      properties:
        documentId:
          type: string
        fromVersion:
          type: integer
        toVersion:
          type: integer
        contentChanged:
          type: boolean
        metadataChanged:
          type: array
          items:
            type: string
        classificationChanged:
          type: boolean
        effectiveAtChanged:
          type: boolean
        expiryAtChanged:
          type: boolean
    UpsertUserRoleRequest:
      type: object
      required: [role]
      properties:
        displayName:
          type: string
        role:
          type: string
          enum: [admin, editor, reviewer, viewer]
        assignedBy:
          type: string
    UpsertUserRoleResponse:
      type: object
      required: [userId, role]
      properties:
        userId:
          type: string
        role:
          type: string
        displayName:
          type: string
    WorkflowTransitionRequest:
      type: object
      required: [toStatus]
      properties:
        toStatus:
          type: string
          enum: [DRAFT, IN_REVIEW, APPROVED, PUBLISHED, ARCHIVED]
        reason:
          type: string
    WorkflowTransitionResponse:
      type: object
      required: [documentId, fromStatus, toStatus]
      properties:
        documentId:
          type: string
        fromStatus:
          type: string
        toStatus:
          type: string
    SearchDocumentItem:
      type: object
      required: [documentId, title, documentType, ownerId, businessUnit, department, classification, status, tags, createdAt]
      properties:
        documentId:
          type: string
        title:
          type: string
        documentType:
          type: string
        ownerId:
          type: string
        businessUnit:
          type: string
        department:
          type: string
        classification:
          type: string
          enum: [PUBLIC, INTERNAL, CONFIDENTIAL, RESTRICTED]
        status:
          type: string
          enum: [DRAFT, IN_REVIEW, APPROVED, PUBLISHED, ARCHIVED]
        tags:
          type: array
          items:
            type: string
        effectiveAt:
          type: string
          format: date-time
        expiryAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
    SearchDocumentsResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/SearchDocumentItem'
    MetricItem:
      type: object
      required: [route, method, requests, errors, durationTotalMs, avgDurationMs]
      properties:
        route:
          type: string
        method:
          type: string
        requests:
          type: integer
        errors:
          type: integer
        durationTotalMs:
          type: integer
        avgDurationMs:
          type: integer
    MetricsResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/MetricItem'
    ApiErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          $ref: '#/components/schemas/ApiError'
    ApiError:
      type: object
      required: [code, message, details, trace_id]
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true
        trace_id:
          type: string
