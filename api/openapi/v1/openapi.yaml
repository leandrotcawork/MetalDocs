openapi: 3.0.3
info:
  title: MetalDocs API
  version: 1.0.0
  description: >
    API inicial do MetalDocs (v1). Escopo atual sem integracao com IA.
servers:
  - url: /api/v1
paths:
  /health/live:
    get:
      summary: Liveness check
      responses:
        '200':
          description: API em execucao
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /health/ready:
    get:
      summary: Readiness check
      responses:
        '200':
          description: Dependencias prontas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          description: Dependencias indisponiveis ou degradadas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /metrics:
    get:
      summary: HTTP RED metrics por rota
      responses:
        '200':
          description: Metricas de requests, erros e duracao
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetricsResponse'
        '401':
          description: Nao autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '403':
          description: Sem permissao
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
  /auth/login:
    post:
      summary: Autentica usuario local e cria sessao por cookie
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthLoginRequest'
      responses:
        '200':
          description: Sessao criada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthLoginResponse'
        '401':
          description: Credenciais invalidas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
  /auth/logout:
    post:
      summary: Revoga a sessao atual
      responses:
        '204':
          description: Sessao encerrada
  /auth/me:
    get:
      summary: Retorna o usuario autenticado atual
      responses:
        '200':
          description: Usuario atual
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUser'
        '401':
          description: Nao autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
  /auth/change-password:
    post:
      summary: Troca a senha do usuario autenticado
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: Senha alterada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChangePasswordResponse'
        '400':
          description: Requisicao invalida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '401':
          description: Nao autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
  /iam/users:
    get:
      summary: Lista usuarios internos com estado de autenticacao
      responses:
        '200':
          description: Lista de usuarios
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListManagedUsersResponse'
    post:
      summary: Cria usuario interno com credencial local inicial
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateManagedUserRequest'
      responses:
        '201':
          description: Usuario criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateManagedUserResponse'
  /iam/users/{userId}:
    patch:
      summary: Atualiza estado e credencial de um usuario interno
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateManagedUserRequest'
      responses:
        '200':
          description: Usuario atualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateManagedUserResponse'
  /iam/users/{userId}/reset-password:
    post:
      summary: Reseta administrativamente a senha de um usuario e exige troca no proximo login
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetManagedUserPasswordRequest'
      responses:
        '200':
          description: Senha resetada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResetManagedUserPasswordResponse'
  /iam/users/{userId}/unlock:
    post:
      summary: Limpa lock operacional e contador de falhas de login de um usuario
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Usuario desbloqueado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnlockManagedUserResponse'
  /iam/admin/overview:
    get:
      summary: Resumo administrativo de usuarios, presenca e atividades recentes
      responses:
        '200':
          description: Resumo administrativo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminOverviewResponse'
        '401':
          description: Nao autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '403':
          description: Sem permissao
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
  /document-types:
    get:
      summary: Lista os tipos documentais suportados
      parameters:
      responses:
        '200':
          description: Lista de tipos documentais
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListDocumentTypesResponse'
        '401':
          description: Nao autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '403':
          description: Sem permissao
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
  /document-types/{typeKey}/bundle:
    get:
      summary: Load document type metadata, active schema, and governance
      parameters:
        - name: typeKey
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Runtime bundle do tipo documental
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /document-families:
    get:
      summary: Lista as familias documentais canonicas
      parameters:
      responses:
        '200':
          description: Lista de familias documentais
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListDocumentFamiliesResponse'
        '401':
          description: Nao autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '403':
          description: Sem permissao
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
  /document-templates:
    get:
      summary: Lista o catalogo de templates documentais atribuiveis por profile
      parameters:
        - in: query
          name: profileCode
          schema:
            type: string
      responses:
        '200':
          description: Catalogo de templates documentais
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListDocumentTemplatesResponse'
        '400':
          description: Requisicao invalida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '401':
          description: Nao autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '403':
          description: Sem permissao
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
  /document-profiles:
    get:
      summary: Lista os perfis documentais disponiveis
      parameters:
      responses:
        '200':
          description: Lista de perfis documentais
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListDocumentProfilesResponse'
        '401':
          description: Nao autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '403':
          description: Sem permissao
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
    post:
      summary: Cria um profile documental
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DocumentProfileCreateRequest'
      responses:
        '201':
          description: Profile criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistryMutationResponse'
        '400':
          description: Requisicao invalida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '401':
          description: Nao autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '403':
          description: Sem permissao
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
  /document-profiles/{profileCode}:
    put:
      summary: Atualiza um profile documental
      parameters:
        - name: profileCode
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DocumentProfileUpdateRequest'
      responses:
        '200':
          description: Profile atualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistryMutationResponse'
        '400':
          description: Requisicao invalida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '401':
          description: Nao autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '403':
          description: Sem permissao
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
    delete:
      summary: Desativa um profile documental
      parameters:
        - name: profileCode
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Profile desativado
        '400':
          description: Requisicao invalida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '401':
          description: Nao autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '403':
          description: Sem permissao
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
  /document-profiles/{profileCode}/schema:
    get:
      summary: Lista as versoes de schema de metadata de um profile
      parameters:
        - name: profileCode
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Schemas do profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListDocumentProfileSchemasResponse'
        '401':
          description: Nao autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '403':
          description: Sem permissao
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
    post:
      summary: Cria ou atualiza uma versao de schema de metadata de um profile
      parameters:
        - name: profileCode
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DocumentProfileSchemaUpsertRequest'
      responses:
        '200':
          description: Schema versionado atualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistryMutationResponse'
        '400':
          description: Requisicao invalida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '401':
          description: Nao autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '403':
          description: Sem permissao
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
  /document-profiles/{profileCode}/schema/{version}/activate:
    put:
      summary: Ativa uma versao de schema de metadata para o profile
      parameters:
        - name: profileCode
          in: path
          required: true
          schema:
            type: string
        - name: version
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Versao de schema ativada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistryMutationResponse'
        '400':
          description: Requisicao invalida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '401':
          description: Nao autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '403':
          description: Sem permissao
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
  /document-profiles/{profileCode}/governance:
    get:
      summary: Busca a governanca ativa de um profile
      parameters:
        - name: profileCode
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Governanca do profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentProfileGovernance'
        '401':
          description: Nao autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '403':
          description: Sem permissao
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
  /document-profiles/{profileCode}/bundle:
    get:
      summary: Carrega profile, schema ativo, governanca e taxonomia em um unico payload
      parameters:
        - name: profileCode
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Bundle de profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentProfileBundleResponse'
        '400':
          description: Requisicao invalida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '401':
          description: Nao autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '403':
          description: Sem permissao
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
  /document-profiles/{profileCode}/template/docx:
    get:
      deprecated: true
      summary: "[DEPRECATED] Template DOCX rendering removed — use content builder"
      parameters:
        - name: profileCode
          in: path
          required: true
          schema:
            type: string
      responses:
        '501':
          description: Template rendering removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
    put:
      summary: Atualiza governanca ativa de um profile
      parameters:
        - name: profileCode
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DocumentProfileGovernanceUpdateRequest'
      responses:
        '200':
          description: Governanca atualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistryMutationResponse'
        '400':
          description: Requisicao invalida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '401':
          description: Nao autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '403':
          description: Sem permissao
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
  /process-areas:
    get:
      summary: Lista as areas de processo documentais
      parameters:
      responses:
        '200':
          description: Lista de areas de processo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListProcessAreasResponse'
        '401':
          description: Nao autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '403':
          description: Sem permissao
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
    post:
      summary: Cria uma area de processo documental
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProcessAreaCreateRequest'
      responses:
        '201':
          description: Area criada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistryMutationResponse'
        '400':
          description: Requisicao invalida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '401':
          description: Nao autenticado
          content:
            application/json:
              schema:
