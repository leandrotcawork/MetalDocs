openapi: 3.0.3
info:
  title: MetalDocs API
  version: 1.0.0
  description: >
    API inicial do MetalDocs (v1). Escopo atual sem integracao com IA.
servers:
  - url: http://192.168.0.3:8080/api/v1
paths:
  /health/live:
    get:
      summary: Liveness check
      responses:
        '200':
          description: API em execucao
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
  /health/ready:
    get:
      summary: Readiness check
      responses:
        '200':
          description: Dependencias prontas
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
  /documents:
    post:
      summary: Cria documento e primeira versao
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDocumentRequest'
      responses:
        '201':
          description: Documento criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentCreatedResponse'
        '400':
          description: Requisicao invalida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '401':
          description: Nao autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '403':
          description: Sem permissao
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
    get:
      summary: Lista documentos
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
      responses:
        '200':
          description: Lista de documentos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListDocumentsResponse'
        '401':
          description: Nao autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '403':
          description: Sem permissao
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
  /documents/{documentId}/versions:
    get:
      summary: Lista versoes de um documento
      parameters:
        - $ref: '#/components/parameters/DocumentId'
        - $ref: '#/components/parameters/UserIdHeader'
      responses:
        '200':
          description: Lista de versoes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListVersionsResponse'
        '401':
          description: Nao autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '403':
          description: Sem permissao
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '404':
          description: Documento nao encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
  /search/documents:
    get:
      summary: Pesquisa documentos por filtros
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: q
          in: query
          required: false
          schema:
            type: string
        - name: ownerId
          in: query
          required: false
          schema:
            type: string
        - name: classification
          in: query
          required: false
          schema:
            type: string
            enum: [PUBLIC, INTERNAL, CONFIDENTIAL, RESTRICTED]
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [DRAFT, IN_REVIEW, APPROVED, PUBLISHED, ARCHIVED]
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Lista filtrada de documentos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchDocumentsResponse'
        '400':
          description: Requisicao invalida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '401':
          description: Nao autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '403':
          description: Sem permissao
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
  /workflow/documents/{documentId}/transitions:
    post:
      summary: Transiciona o status de workflow do documento
      parameters:
        - $ref: '#/components/parameters/DocumentId'
        - $ref: '#/components/parameters/UserIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkflowTransitionRequest'
      responses:
        '200':
          description: Workflow atualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowTransitionResponse'
        '400':
          description: Requisicao invalida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '401':
          description: Nao autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '403':
          description: Sem permissao
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '404':
          description: Documento nao encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '409':
          description: Transicao invalida para o status atual
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
  /iam/users/{userId}/roles:
    post:
      summary: Cria/atualiza usuario IAM e atribui role
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertUserRoleRequest'
      responses:
        '200':
          description: Role atribuida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpsertUserRoleResponse'
        '400':
          description: Requisicao invalida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '401':
          description: Nao autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '403':
          description: Sem permissao
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
components:
  parameters:
    DocumentId:
      name: documentId
      in: path
      required: true
      schema:
        type: string
    UserIdHeader:
      name: X-User-Id
      in: header
      required: true
      schema:
        type: string
  schemas:
    CreateDocumentRequest:
      type: object
      required:
        - title
        - ownerId
      properties:
        title:
          type: string
          minLength: 1
        ownerId:
          type: string
          minLength: 1
        classification:
          type: string
          enum: [PUBLIC, INTERNAL, CONFIDENTIAL, RESTRICTED]
          default: INTERNAL
        initialContent:
          type: string
    DocumentCreatedResponse:
      type: object
      required:
        - documentId
        - version
        - status
      properties:
        documentId:
          type: string
        version:
          type: integer
          minimum: 1
        status:
          type: string
          enum: [DRAFT, IN_REVIEW, APPROVED, PUBLISHED, ARCHIVED]
    DocumentListItem:
      type: object
      required: [documentId, title, ownerId, status]
      properties:
        documentId:
          type: string
        title:
          type: string
        ownerId:
          type: string
        status:
          type: string
    ListDocumentsResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/DocumentListItem'
    VersionListItem:
      type: object
      required: [documentId, version, createdAt]
      properties:
        documentId:
          type: string
        version:
          type: integer
          minimum: 1
        createdAt:
          type: string
          format: date-time
    ListVersionsResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/VersionListItem'
    UpsertUserRoleRequest:
      type: object
      required: [role]
      properties:
        displayName:
          type: string
        role:
          type: string
          enum: [admin, editor, reviewer, viewer]
        assignedBy:
          type: string
    UpsertUserRoleResponse:
      type: object
      required: [userId, role]
      properties:
        userId:
          type: string
        role:
          type: string
        displayName:
          type: string
    WorkflowTransitionRequest:
      type: object
      required: [toStatus]
      properties:
        toStatus:
          type: string
          enum: [DRAFT, IN_REVIEW, APPROVED, PUBLISHED, ARCHIVED]
        reason:
          type: string
    WorkflowTransitionResponse:
      type: object
      required: [documentId, fromStatus, toStatus]
      properties:
        documentId:
          type: string
        fromStatus:
          type: string
        toStatus:
          type: string
    SearchDocumentItem:
      type: object
      required: [documentId, title, ownerId, classification, status, createdAt]
      properties:
        documentId:
          type: string
        title:
          type: string
        ownerId:
          type: string
        classification:
          type: string
          enum: [PUBLIC, INTERNAL, CONFIDENTIAL, RESTRICTED]
        status:
          type: string
          enum: [DRAFT, IN_REVIEW, APPROVED, PUBLISHED, ARCHIVED]
        createdAt:
          type: string
          format: date-time
    SearchDocumentsResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/SearchDocumentItem'
    ApiErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          $ref: '#/components/schemas/ApiError'
    ApiError:
      type: object
      required: [code, message, details, trace_id]
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true
        trace_id:
          type: string
