                $ref: '#/components/schemas/ApiErrorEnvelope'
  /document-subjects:
    get:
      summary: Lista os assuntos documentais
      parameters:
        - name: processArea
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Lista de assuntos documentais
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListSubjectsResponse'
        '401':
          description: Nao autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '403':
          description: Sem permissao
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
    post:
      summary: Cria um assunto documental
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubjectCreateRequest'
      responses:
        '201':
          description: Assunto criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistryMutationResponse'
        '400':
          description: Requisicao invalida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '401':
          description: Nao autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '403':
          description: Sem permissao
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
  /document-subjects/{code}:
    put:
      summary: Atualiza um assunto documental
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubjectUpdateRequest'
      responses:
        '200':
