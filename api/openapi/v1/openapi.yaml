openapi: 3.0.3
info:
  title: MetalDocs API
  version: 1.0.0
  description: >
    API inicial do MetalDocs (v1). Escopo atual sem integracao com IA.
servers:
  - url: /api/v1
paths:
  /health/live:
    get:
      summary: Liveness check
      responses:
        '200':
          description: API em execucao
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /health/ready:
    get:
      summary: Readiness check
      responses:
        '200':
          description: Dependencias prontas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          description: Dependencias indisponiveis ou degradadas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /metrics:
    get:
      summary: HTTP RED metrics por rota
      responses:
        '200':
          description: Metricas de requests, erros e duracao
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetricsResponse'
        '401':
          description: Nao autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '403':
          description: Sem permissao
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
  /auth/login:
    post:
      summary: Autentica usuario local e cria sessao por cookie
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthLoginRequest'
      responses:
        '200':
          description: Sessao criada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthLoginResponse'
        '401':
          description: Credenciais invalidas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
  /auth/logout:
    post:
      summary: Revoga a sessao atual
      responses:
        '204':
          description: Sessao encerrada
  /auth/me:
    get:
      summary: Retorna o usuario autenticado atual
      responses:
        '200':
          description: Usuario atual
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUser'
        '401':
          description: Nao autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
  /auth/change-password:
    post:
      summary: Troca a senha do usuario autenticado
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: Senha alterada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChangePasswordResponse'
        '400':
          description: Requisicao invalida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '401':
          description: Nao autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
  /iam/users:
    get:
      summary: Lista usuarios internos com estado de autenticacao
      responses:
        '200':
          description: Lista de usuarios
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListManagedUsersResponse'
    post:
      summary: Cria usuario interno com credencial local inicial
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateManagedUserRequest'
      responses:
        '201':
          description: Usuario criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateManagedUserResponse'
  /iam/users/{userId}:
    patch:
      summary: Atualiza estado e credencial de um usuario interno
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateManagedUserRequest'
      responses:
        '200':
          description: Usuario atualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateManagedUserResponse'
  /iam/users/{userId}/reset-password:
    post:
      summary: Reseta administrativamente a senha de um usuario e exige troca no proximo login
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetManagedUserPasswordRequest'
      responses:
        '200':
          description: Senha resetada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResetManagedUserPasswordResponse'
  /iam/users/{userId}/unlock:
    post:
      summary: Limpa lock operacional e contador de falhas de login de um usuario
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Usuario desbloqueado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnlockManagedUserResponse'
  /document-types:
    get:
      summary: Lista os tipos documentais suportados
      parameters:
      responses:
        '200':
          description: Lista de tipos documentais
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListDocumentTypesResponse'
        '401':
          description: Nao autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '403':
          description: Sem permissao
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
  /document-families:
    get:
      summary: Lista as familias documentais canonicas
      parameters:
      responses:
        '200':
          description: Lista de familias documentais
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListDocumentFamiliesResponse'
        '401':
          description: Nao autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '403':
          description: Sem permissao
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
  /document-profiles:
    get:
      summary: Lista os perfis documentais disponiveis
      parameters:
      responses:
        '200':
          description: Lista de perfis documentais
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListDocumentProfilesResponse'
        '401':
          description: Nao autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '403':
          description: Sem permissao
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
  /document-profiles/{profileCode}/schema:
    get:
      summary: Lista as versoes de schema de metadata de um profile
      parameters:
        - name: profileCode
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Schemas do profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListDocumentProfileSchemasResponse'
        '401':
          description: Nao autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '403':
          description: Sem permissao
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
  /document-profiles/{profileCode}/governance:
    get:
      summary: Busca a governanca ativa de um profile
      parameters:
        - name: profileCode
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Governanca do profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentProfileGovernance'
        '401':
          description: Nao autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '403':
          description: Sem permissao
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
  /process-areas:
    get:
      summary: Lista as areas de processo documentais
      parameters:
      responses:
        '200':
          description: Lista de areas de processo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListProcessAreasResponse'
        '401':
          description: Nao autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '403':
          description: Sem permissao
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
    post:
      summary: Cria uma area de processo documental
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProcessAreaCreateRequest'
      responses:
        '201':
          description: Area criada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistryMutationResponse'
        '400':
          description: Requisicao invalida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '401':
          description: Nao autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '403':
          description: Sem permissao
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
  /process-areas/{code}:
    put:
      summary: Atualiza uma area de processo documental
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProcessAreaUpdateRequest'
      responses:
        '200':
          description: Area atualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistryMutationResponse'
        '400':
          description: Requisicao invalida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '401':
          description: Nao autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '403':
          description: Sem permissao
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
    delete:
      summary: Desativa uma area de processo documental
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Area desativada
        '400':
          description: Requisicao invalida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '401':
          description: Nao autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '403':
          description: Sem permissao
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
  /document-subjects:
    get:
      summary: Lista os assuntos documentais
      parameters:
        - name: processArea
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Lista de assuntos documentais
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListSubjectsResponse'
        '401':
          description: Nao autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '403':
          description: Sem permissao
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
    post:
      summary: Cria um assunto documental
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubjectCreateRequest'
      responses:
        '201':
          description: Assunto criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistryMutationResponse'
        '400':
          description: Requisicao invalida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '401':
          description: Nao autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '403':
          description: Sem permissao
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
  /document-subjects/{code}:
    put:
      summary: Atualiza um assunto documental
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubjectUpdateRequest'
      responses:
        '200':
          description: Assunto atualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistryMutationResponse'
        '400':
          description: Requisicao invalida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '401':
          description: Nao autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '403':
          description: Sem permissao
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
    delete:
      summary: Desativa um assunto documental
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Assunto desativado
        '400':
          description: Requisicao invalida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '401':
          description: Nao autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '403':
          description: Sem permissao
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
  /audit/events:
    get:
      summary: Lista eventos de auditoria append-only
      parameters:
        - name: resourceType
          in: query
          required: false
          schema:
            type: string
        - name: resourceId
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
      responses:
        '200':
          description: Lista de eventos de auditoria
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListAuditEventsResponse'
        '400':
          description: Parametro invalido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '401':
          description: Nao autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '403':
          description: Sem permissao
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
  /notifications:
    get:
      summary: Lista notificacoes operacionais do usuario autenticado
      parameters:
        - name: recipientUserId
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [PENDING, SENT, READ]
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
      responses:
        '200':
          description: Lista de notificacoes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListNotificationsResponse'
        '401':
          description: Nao autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '403':
          description: Sem permissao
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
  /notifications/{notificationId}/read:
    post:
      summary: Marca notificacao como lida
      parameters:
        - name: notificationId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Notificacao marcada como lida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarkNotificationReadResponse'
        '401':
          description: Nao autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '404':
          description: Notificacao nao encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
  /access-policies:
    get:
      summary: Lista policies de acesso por recurso
      parameters:
        - name: resourceScope
          in: query
          required: true
          schema:
            type: string
            enum: [document, document_type, area]
        - name: resourceId
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Lista de policies
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListAccessPoliciesResponse'
        '400':
          description: Requisicao invalida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '401':
          description: Nao autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '403':
          description: Sem permissao
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
    put:
      summary: Substitui policies de acesso de um recurso
      parameters:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReplaceAccessPoliciesRequest'
      responses:
        '200':
          description: Policies substituidas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReplaceAccessPoliciesResponse'
        '400':
          description: Requisicao invalida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '401':
          description: Nao autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '403':
          description: Sem permissao
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
  /documents:
    post:
      summary: Cria documento e primeira versao
      parameters:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDocumentRequest'
      responses:
        '201':
          description: Documento criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentCreatedResponse'
        '400':
          description: Requisicao invalida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '401':
          description: Nao autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '403':
          description: Sem permissao
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
    get:
      summary: Lista documentos
      parameters:
      responses:
        '200':
          description: Lista de documentos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListDocumentsResponse'
        '401':
          description: Nao autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '403':
          description: Sem permissao
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
  /documents/{documentId}:
    get:
      summary: Busca um documento por id
      parameters:
        - $ref: '#/components/parameters/DocumentId'
      responses:
        '200':
          description: Documento encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentListItem'
        '401':
          description: Nao autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '403':
          description: Sem permissao
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '404':
          description: Documento nao encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
  /documents/{documentId}/versions:
    post:
      summary: Cria nova versao do documento
      parameters:
        - $ref: '#/components/parameters/DocumentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddVersionRequest'
      responses:
        '201':
          description: Nova versao criada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionListItem'
        '400':
          description: Requisicao invalida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '401':
          description: Nao autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '403':
          description: Sem permissao
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '404':
          description: Documento nao encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '409':
          description: Versionamento nao permitido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
    get:
      summary: Lista versoes de um documento
      parameters:
        - $ref: '#/components/parameters/DocumentId'
      responses:
        '200':
          description: Lista de versoes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListVersionsResponse'
        '401':
          description: Nao autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '403':
          description: Sem permissao
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '404':
          description: Documento nao encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
  /documents/{documentId}/versions/diff:
    get:
      summary: Compara duas versoes do documento
      parameters:
        - $ref: '#/components/parameters/DocumentId'
        - name: fromVersion
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
        - name: toVersion
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Diff entre versoes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionDiffResponse'
        '400':
          description: Requisicao invalida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '401':
          description: Nao autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '403':
          description: Sem permissao
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '404':
          description: Documento ou versao nao encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
  /documents/{documentId}/attachments:
    post:
      summary: Faz upload de um anexo para o documento
      parameters:
        - $ref: '#/components/parameters/DocumentId'
      requestBody:
        required: true
        content:
          multipart/form-data:
