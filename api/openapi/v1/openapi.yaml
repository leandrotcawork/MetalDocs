components:
  parameters:
    DocumentId:
      name: documentId
      in: path
      required: true
      schema:
        type: string
  schemas:
    AuthLoginRequest:
      type: object
      required: [identifier, password]
      properties:
        identifier:
          type: string
        password:
          type: string
    CurrentUser:
      type: object
      required: [userId, username, displayName, mustChangePassword, roles]
      properties:
        userId:
          type: string
        username:
          type: string
        email:
          type: string
        displayName:
          type: string
        mustChangePassword:
          type: boolean
        roles:
          type: array
          items:
            type: string
            enum: [admin, editor, reviewer, viewer]
    AuthLoginResponse:
      type: object
      required: [user, expiresAt]
      properties:
        user:
          $ref: '#/components/schemas/CurrentUser'
        expiresAt:
          type: string
          format: date-time
    HealthCheckItem:
      type: object
      required: [name, status]
      properties:
        name:
          type: string
        status:
          type: string
        mode:
          type: string
        provider:
          type: string
        enabled:
          type: boolean
        detail:
          type: string
    HealthResponse:
      type: object
      required: [status, checks]
      properties:
        status:
          type: string
        checks:
          type: array
          items:
            $ref: '#/components/schemas/HealthCheckItem'
    ChangePasswordRequest:
      type: object
      required: [newPassword]
      properties:
        currentPassword:
          type: string
          description: Obrigatoria para troca de senha em sessao normal; opcional no fluxo de primeiro acesso com troca obrigatoria.
        newPassword:
          type: string
    ChangePasswordResponse:
      type: object
      required: [changed, user]
      properties:
        changed:
          type: boolean
        user:
          $ref: '#/components/schemas/CurrentUser'
    ManagedUserItem:
      type: object
      required: [userId, username, displayName, isActive, mustChangePassword, failedLoginAttempts, roles, createdAt, updatedAt]
      properties:
        userId:
          type: string
        username:
          type: string
        email:
          type: string
        displayName:
          type: string
        isActive:
          type: boolean
        mustChangePassword:
          type: boolean
        failedLoginAttempts:
          type: integer
        lockedUntil:
          type: string
          format: date-time
        lastLoginAt:
          type: string
          format: date-time
        roles:
          type: array
          items:
            type: string
            enum: [admin, editor, reviewer, viewer]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    AdminOnlineUserItem:
      type: object
      required: [userId, username, displayName, lastSeenAt]
      properties:
        userId:
          type: string
        username:
          type: string
        displayName:
          type: string
        lastSeenAt:
          type: string
          format: date-time
    AdminOverviewResponse:
      type: object
      required: [users, onlineUsers, recentActivities]
      properties:
        users:
          type: array
          items:
            $ref: '#/components/schemas/ManagedUserItem'
        onlineUsers:
          type: array
          items:
            $ref: '#/components/schemas/AdminOnlineUserItem'
        recentActivities:
          type: array
          items:
            $ref: '#/components/schemas/AuditEventItem'
    ListManagedUsersResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ManagedUserItem'
    CreateManagedUserRequest:
      type: object
      required: [username, displayName, password, roles]
      properties:
        userId:
          type: string
        username:
          type: string
        email:
          type: string
        displayName:
          type: string
        password:
          type: string
        roles:
          type: array
          items:
            type: string
            enum: [admin, editor, reviewer, viewer]
    CreateManagedUserResponse:
      type: object
      required: [userId]
      properties:
        userId:
          type: string
    UpdateManagedUserRequest:
      type: object
      properties:
        displayName:
          type: string
        email:
          type: string
        isActive:
          type: boolean
        newPassword:
          type: string
        mustChangePassword:
          type: boolean
    UpdateManagedUserResponse:
      type: object
      required: [userId, updated]
      properties:
        userId:
          type: string
        updated:
          type: boolean
    ResetManagedUserPasswordRequest:
      type: object
      required: [newPassword]
      properties:
        newPassword:
          type: string
    ResetManagedUserPasswordResponse:
      type: object
      required: [userId, reset, mustChangePassword]
      properties:
        userId:
          type: string
        reset:
          type: boolean
        mustChangePassword:
          type: boolean
    UnlockManagedUserResponse:
      type: object
      required: [userId, unlocked]
      properties:
        userId:
          type: string
        unlocked:
          type: boolean
    ReplaceUserRolesRequest:
      type: object
      required: [displayName, roles]
      properties:
        displayName:
          type: string
        assignedBy:
          type: string
        roles:
          type: array
          minItems: 1
          items:
            type: string
            enum: [admin, editor, reviewer, viewer]
    ReplaceUserRolesResponse:
      type: object
      required: [userId, displayName, roles]
      properties:
        userId:
          type: string
        displayName:
          type: string
        roles:
          type: array
          items:
            type: string
            enum: [admin, editor, reviewer, viewer]
    CreateDocumentRequest:
      type: object
      required:
        - title
        - ownerId
        - businessUnit
        - department
      properties:
        title:
          type: string
          minLength: 1
        documentType:
          type: string
          description: Legacy alias accepted during transition. Prefer `documentProfile`.
          enum: [po, it, rg]
        documentProfile:
          type: string
          description: Canonical document profile code resolved by the registry.
        processArea:
          type: string
          description: Optional process taxonomy code, such as `marketplaces` or `quality`.
        subject:
          type: string
        ownerId:
          type: string
          minLength: 1
        businessUnit:
          type: string
          minLength: 1
        department:
          type: string
          minLength: 1
        classification:
          type: string
          enum: [PUBLIC, INTERNAL, CONFIDENTIAL, RESTRICTED]
          default: INTERNAL
        tags:
          type: array
          items:
            type: string
        effectiveAt:
          type: string
          format: date-time
        expiryAt:
          type: string
          format: date-time
        audience:
          $ref: '#/components/schemas/DocumentAudience'
        metadata:
          type: object
          additionalProperties: true
        initialContent:
          type: string
    DocumentCreatedResponse:
      type: object
      required:
        - documentId
        - version
        - status
        - documentType
        - documentProfile
        - documentFamily
        - documentSequence
        - documentCode
        - profileSchemaVersion
      properties:
        documentId:
          type: string
        version:
          type: integer
          minimum: 1
        status:
          type: string
          enum: [DRAFT, IN_REVIEW, APPROVED, PUBLISHED, ARCHIVED]
        documentType:
          type: string
          description: Transitional alias mirroring the resolved profile code.
        documentProfile:
          type: string
          description: Resolved document profile code.
        documentFamily:
          type: string
          description: Canonical family resolved from the selected profile.
        documentSequence:
          type: integer
          minimum: 1
        documentCode:
          type: string
        profileSchemaVersion:
          type: integer
          minimum: 1
        processArea:
          type: string
        subject:
          type: string
    DocumentListItem:
      type: object
      required: [documentId, title, documentType, documentProfile, documentFamily, documentSequence, documentCode, ownerId, businessUnit, department, classification, status, tags]
      properties:
        documentId:
          type: string
        title:
          type: string
        documentType:
          type: string
          description: Transitional alias mirroring the resolved profile code.
        documentProfile:
          type: string
          description: Resolved document profile code.
        documentFamily:
          type: string
          description: Canonical family resolved from the selected profile.
        documentSequence:
          type: integer
          minimum: 1
        documentCode:
          type: string
        profileSchemaVersion:
          type: integer
          minimum: 1
        processArea:
          type: string
        subject:
          type: string
        ownerId:
          type: string
        businessUnit:
          type: string
        department:
          type: string
        classification:
          type: string
        status:
          type: string
        tags:
          type: array
          items:
            type: string
        effectiveAt:
          type: string
          format: date-time
        expiryAt:
          type: string
          format: date-time
    ListDocumentsResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/DocumentListItem'
    MetadataFieldRule:
      type: object
      required: [name, type, required]
      properties:
        name:
          type: string
        type:
          type: string
        required:
          type: boolean
    DocumentAudience:
      type: object
      required: [mode]
      properties:
        mode:
          type: string
          enum: [INTERNAL, DEPARTMENT, AREAS, EXPLICIT]
        departmentCodes:
          type: array
