services:
  postgres:
    image: postgres:16
    container_name: metaldocs-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - metaldocs_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: metaldocs-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - metaldocs_redis_data:/data

  minio:
    image: minio/minio:latest
    container_name: metaldocs-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - metaldocs_minio_data:/data

  api:
    build:
      context: ../..
      dockerfile: deploy/docker/api.Dockerfile
    image: ${API_IMAGE}
    container_name: metaldocs-api
    depends_on:
      - postgres
      - redis
      - minio
    environment:
      APP_ENV: ${APP_ENV}
      APP_HOST: ${APP_HOST}
      APP_PORT: ${APP_PORT}
      METALDOCS_REPOSITORY: postgres
      METALDOCS_AUTH_ENABLED: ${METALDOCS_AUTH_ENABLED}
      METALDOCS_AUTHZ_CACHE_TTL_SECONDS: ${METALDOCS_AUTHZ_CACHE_TTL_SECONDS}
      METALDOCS_RATE_LIMIT_ENABLED: ${METALDOCS_RATE_LIMIT_ENABLED}
      METALDOCS_RATE_LIMIT_WINDOW_SECONDS: ${METALDOCS_RATE_LIMIT_WINDOW_SECONDS}
      METALDOCS_RATE_LIMIT_MAX_REQUESTS: ${METALDOCS_RATE_LIMIT_MAX_REQUESTS}
      METALDOCS_CORS_ENABLED: false
      METALDOCS_ATTACHMENTS_ROOT: /var/lib/metaldocs/attachments
      METALDOCS_ATTACHMENTS_SIGNING_SECRET: ${METALDOCS_ATTACHMENTS_SIGNING_SECRET}
      METALDOCS_ATTACHMENTS_DOWNLOAD_TTL_SECONDS: ${METALDOCS_ATTACHMENTS_DOWNLOAD_TTL_SECONDS}
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: ${POSTGRES_DB}
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGSSLMODE: disable
    volumes:
      - metaldocs_attachments_data:/var/lib/metaldocs/attachments

  worker:
    build:
      context: ../..
      dockerfile: deploy/docker/worker.Dockerfile
    image: ${WORKER_IMAGE}
    container_name: metaldocs-worker
    depends_on:
      - postgres
      - redis
      - minio
      - api
    environment:
      METALDOCS_REPOSITORY: postgres
      METALDOCS_WORKER_POLL_INTERVAL_SECONDS: ${METALDOCS_WORKER_POLL_INTERVAL_SECONDS}
      METALDOCS_WORKER_BATCH_SIZE: ${METALDOCS_WORKER_BATCH_SIZE}
      METALDOCS_WORKER_REVIEW_REMINDER_DAYS: ${METALDOCS_WORKER_REVIEW_REMINDER_DAYS}
      METALDOCS_WORKER_RUN_ONCE: ${METALDOCS_WORKER_RUN_ONCE}
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: ${POSTGRES_DB}
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGSSLMODE: disable
    volumes:
      - metaldocs_attachments_data:/var/lib/metaldocs/attachments

  web:
    build:
      context: ../../frontend/apps/web
      dockerfile: Dockerfile
    image: ${WEB_IMAGE}
    container_name: metaldocs-web
    depends_on:
      - api

  gateway:
    image: nginx:1.27-alpine
    container_name: metaldocs-gateway
    depends_on:
      - api
      - web
    ports:
      - "80:80"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  metaldocs_postgres_data:
  metaldocs_redis_data:
  metaldocs_minio_data:
  metaldocs_attachments_data:
